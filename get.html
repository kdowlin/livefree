<style>
  :root{ --cream:#FAF8F3; --amber:#F0A06B; --gold:#FBC580; --ink:#1F2D34; }

  html,body{height:100%}
  body{

    color:var(--ink);

  a.store{
    display:flex;align-items:center;justify-content:center;gap:10px;
    text-decoration:none;color:var(--cream);background:var(--ink);
    padding:16px 20px;border-radius:14px;font-size:17px;font-weight:600;
  }
  a.store.alt{background:transparent;color:var(--ink);border:1.5px solid rgba(31,45,52,.28)}
  .muted{margin-top:22px;font-size:13px;opacity:.55}
  svg.i{width:22px;height:22px;flex:0 0 auto}
</style>
